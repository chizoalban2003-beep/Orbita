# Multi-sport backtest panel for examples/07_multi_sport_backtest.py
#
# 13 verified events (5 soccer, 3 NBA, 3 tennis, 2 MMA) collected
# 2026-06-26. For each event:
#   - prior_a / prior_b / prior_draw : de-vigged sportsbook implied probabilities
#     (vig stripped by normalisation to sum to 1.0)
#   - roster_strength_a / roster_strength_b : 0-100 aggregate per sport
#     (heuristic; see in-file notes for the normalisation choice per sport)
#   - actual : ground-truth outcome label
#   - notes : context + source URL

